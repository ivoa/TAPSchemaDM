name: Publish To UKSRC Repository

on:
  push:
    tags:
      - 'v*' # Triggers on tags like v1.0.0, v0.1.0-alpha, etc.

  workflow_dispatch: # Allow manual triggering of the workflow from the GitHub Actions tab in the repository UI

jobs:
  publish:

    runs-on: ubuntu-latest
    if: github.repository == 'ivoa/TAPSchemaDM' # Don't run on forks
    permissions:
      contents: read

    steps:
    - uses: actions/checkout@v4
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    # Configure Gradle for optimal use in GitHub Actions, including caching of downloaded dependencies.
    # See: https://github.com/gradle/actions/blob/main/setup-gradle/README.md
    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Test with Gradle Wrapper
      run: ./gradlew publish -PskipSigning=True
      env:
        UKSRC_REPO_USERNAME: ${{ secrets.UKSRC_REPO_USERNAME }}
        UKSRC_REPO_PASSWORD: ${{ secrets.UKSRC_REPO_PASSWORD }}

    - name: Build JAR
      run: ./gradlew jar

    - name: Attach JAR to GitHub Release
      if: startsWith(github.ref, 'refs/tags/v')
      uses: softprops/action-gh-release@v2
      with:
        files: build/libs/*.jar

  
